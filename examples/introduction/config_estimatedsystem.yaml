# config for introduction estimated system
start_date: "1994-07-12" #1972-01-01 1984-01-01 1994-07-12
end_date: "2024-03-28"

# Set to true to use BBG data files (instrument code + "_BBG" suffix, e.g. SOFR_BBG.csv).
# Files may cover a shorter period than instrument_periods below — that is fine.
use_bbg: False

# Optional: override portfolio instruments (default from futuresestimateconfig.yaml).
# When use_bbg: true, _BBG suffix is appended in code.
# When instruments_from_csv is set, instruments are read from that CSV (Symbol column) with _yfinance suffix.
instruments_from_csv: "data/anson/S&P_500_component_stocks_401-500.csv"
instruments_column: "Symbol"
instruments_suffix: "_yfinance"

# instruments:
#   ['NVDA_yfinance',
#   'MSFT_yfinance',
#   'META_yfinance',
#   'GOOGL_yfinance',
#   'AMZN_yfinance',
#   'AAPL_yfinance',
#   'TSLA_yfinance']

bnh_instruments:
  ['SP500',
  'SPY_yfinance']

# When an ETF (e.g. SPY_yfinance) is in instruments and its multiple_prices has 
# DIVIDEND_YIELD and FUNDING_COST:
#   raw_futures_roll = PRICE*DIVIDEND_YIELD − CARRY*FUNDING_COST, 
# roll_differentials = 1 (years).

Notes: |
  Data periods (BBG):
  Instrument	Start date	End date	Span
  SOFR_BBG	1984-03-23	2024-03-28	~40 years
  US10_BBG	1982-08-30	2024-03-28	~42 years
  EUROSTX_BBG	2014-03-13	2024-03-28	~10 years
  MXP_BBG	1995-09-15	2024-03-28	~29 years
  CORN_BBG	1972-10-18	2024-03-28	~51 years
  V2X_BBG	2013-01-02	2024-03-28	~11 years